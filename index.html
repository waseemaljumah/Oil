<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>نظام متابعة تغيير الزيت</title>
  <link rel="stylesheet" href="style.css" />
  <script type="module" src="script.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>
<body>

<!-- ===== شريط التنقل العلوي ===== -->
<nav class="top-nav">
  <div class="nav-tabs">
    <button class="nav-btn active" data-tab="form-tab">➕ البحث والإضافة والمتابعة</button>
    <button class="nav-btn" data-tab="stored-tab">🗂 المركبات المخزنة</button>
    <button class="nav-btn nav-cars-link" onclick="window.location='cars.html'">🚗 مركبات الشركة</button>
  </div>
  <button id="darkToggle" class="dark-toggle-btn">🌙</button>
</nav>

<!-- ===== تاب: البحث والإضافة والمتابعة اليومية ===== -->
<div id="form-tab" class="tab-content active">

  <h2>نموذج إدخال بيانات المركبات</h2>

  <div class="card">
    <label>رقم المعدة</label>
    <input id="number" placeholder="رقم المعدة"/>

    <label>نوع المعدة</label>
    <select id="typeSelect">
      <option value="قلاب مرسيدس">قلاب مرسيدس</option>
      <option value="قلاب فولفو">قلاب فولفو</option>
      <option value="لوبد فولفو">لوبد فولفو</option>
      <option value="وايت فولفو">وايت فولفو</option>
      <option value="وايت">وايت</option>
      <option value="شيول">شيول</option>
      <option value="بوكلين">بوكلين</option>
      <option value="بلدوزر">بلدوزر</option>
      <option value="بوبكات">بوبكات</option>
      <option value="اخرى">أخرى</option>
    </select>
    <input id="typeOther" placeholder="اكتب نوع المعدة" />

    <label>تاريخ آخر تغيير زيت</label>
    <input type="date" id="date" />

    <!-- الممشى الحالي - 3 خيارات -->
    <label>الممشى الحالي</label>
    <div class="radio-group">
      <label class="radio-option">
        <input type="radio" name="currentKmMode" value="has" checked /> يوجد ممشى حالي
      </label>
      <label class="radio-option">
        <input type="radio" name="currentKmMode" value="none" /> لا يوجد ممشى حالي
      </label>
      <label class="radio-option">
        <input type="radio" name="currentKmMode" value="broken" /> العداد لا يعمل
      </label>
    </div>
    <input type="number" id="currentKm" placeholder="أدخل الممشى الحالي" />

    <label>ممشى آخر تغيير زيت</label>
    <input type="number" id="lastKmInput" placeholder="أدخل الممشى عند آخر تغيير"/>
    <select id="lastKmSelect">
      <option value="">يوجد ممشى لآخر تغيير زيت</option>
      <option value="no">لا يوجد عداد في آخر تغيير زيت</option>
    </select>
    <input id="lastKmOther" placeholder="اكتب الملاحظة" />

    <label>حالة فلتر الزيت</label>
    <select id="filterSelect">
      <option value="تم تغييره في آخر تغيير">تم تغييره في آخر تغيير</option>
      <option value="تم تغييره في التغيير قبل الأخير">تم تغييره في التغيير قبل الأخير</option>
      <option value="لم يتم تغييره في آخر تغييرين">لم يتم تغييره في آخر تغييرين</option>
      <option value="اخرى">أخرى</option>
    </select>
    <input id="filterOther" placeholder="اكتب حالة الفلتر" />

    <div class="save-btns-row">
      <button id="saveBtn">💾 حفظ / تحديث / إضافة للمتابعة اليومية</button>
      <button id="saveOnlyBtn" class="btn-secondary">💾 حفظ / تحديث فقط</button>
    </div>
  </div>

  <div class="card">
    <h3>بحث وحذف</h3>
    <input id="searchNumber" placeholder="ادخل رقم المعدة للبحث" />
    <button id="searchBtn">بحث</button>
    <button id="deleteBtn" class="btn-danger">حذف</button>
  </div>

  <div class="card">
    <h3>المتابعة اليومية</h3>
    <div id="dailyList"></div>
    <div id="output" style="display:none;"></div>
    <div class="copy-btns">
      <button id="copyBtn">📋 نسخ الكل</button>
      <button id="copyGreenBtn">🟢 أخضر — ضمن الحد المسموح</button>
      <button id="copyRedBtn">🔴 أحمر — تجاوز حد التغيير</button>
      <button id="copyWhiteBtn">⚪ أبيض — لا يوجد ممشى حالي</button>
      <button id="copyBlueBtn">🔵 أزرق — العداد لا يعمل</button>
      <button id="copyBlackBtn">⚫ أسود — لا يوجد عداد في آخر تغيير</button>
    </div>
  </div>

</div>

<!-- ===== تاب: المركبات المخزنة ===== -->
<div id="stored-tab" class="tab-content">

  <div class="card">
    <h3>🗂 المركبات المخزنة</h3>

    <div class="stored-search-bar">
      <input id="storedSearch" placeholder="🔍 بحث برقم المعدة..." />
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">📋 الكل</button>
      <button class="filter-btn" data-filter="green">🟢 أخضر</button>
      <button class="filter-btn" data-filter="red">🔴 أحمر</button>
      <button class="filter-btn" data-filter="white">⚪ أبيض</button>
      <button class="filter-btn" data-filter="blue">🔵 أزرق</button>
      <button class="filter-btn" data-filter="black">⚫ أسود</button>
    </div>

    <div id="vehicleList"></div>
  </div>

  <div class="card">
    <h3>📊 تصدير البيانات إلى Excel</h3>
    <label>ترتيب التصدير:</label>
    <select id="exportSortSelect">
      <option value="type">حسب نوع المعدة</option>
      <option value="numAsc">حسب رقم الباب (تصاعدي)</option>
      <option value="numDesc">حسب رقم الباب (تنازلي)</option>
    </select>
    <button id="exportBtn">📥 تصدير إلى Excel</button>
  </div>

</div>

<script>
  // تبويب التنقل
  document.querySelectorAll('.nav-btn[data-tab]').forEach(btn => {
    btn.addEventListener('click', () => {
      const tab = btn.dataset.tab;
      if (!tab) return;
      document.querySelectorAll('.nav-btn[data-tab]').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(tab).classList.add('active');
    });
  });

  // الوضع الليلي
  const darkToggle = document.getElementById("darkToggle");
  if (localStorage.getItem("darkMode") === "on") {
    document.body.classList.add("dark");
    darkToggle.textContent = "☀️";
  }
  darkToggle.addEventListener("click", () => {
    document.body.classList.toggle("dark");
    const isDark = document.body.classList.contains("dark");
    darkToggle.textContent = isDark ? "☀️" : "🌙";
    localStorage.setItem("darkMode", isDark ? "on" : "off");
  });
</script>

</body>
</html>
