<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>متابعة زيوت سيارات الشركة</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="cars.css" />
  <script type="module" src="cars.js"></script>
</head>
<body>

<button id="darkToggle">🌙</button>

<div style="text-align:center; margin-bottom:10px;">
  <a href="index.html" class="page-link">← العودة لنظام المعدات</a>
</div>

<h2>🚗 متابعة زيوت سيارات الشركة</h2>

<!-- إضافة / تعديل سيارة -->
<div class="card">
  <h3>إضافة سيارة أو تحديث بياناتها</h3>
  <label>رقم اللوحة</label>
  <input id="carPlate" placeholder="مثال: ABC 1234" />
  <label>اسم السيارة / الموديل</label>
  <input id="carName" placeholder="مثال: تويوتا هايلاكس 2022" />
  <label>الممشى المطلوب بين كل تغيير زيت (كم)</label>
  <input type="number" id="carOilInterval" placeholder="مثال: 5000" />
  <label>الممشى الحالي (كم)</label>
  <input type="number" id="carCurrentKm" placeholder="مثال: 47000" />
  <button id="saveCarBtn">💾 حفظ / تحديث السيارة</button>
</div>

<!-- إضافة سجل تغيير زيت -->
<div class="card">
  <h3>إضافة سجل تغيير زيت</h3>
  <label>رقم اللوحة</label>
  <input id="recordPlate" placeholder="ادخل رقم لوحة السيارة" />
  <label>تاريخ التغيير</label>
  <input type="date" id="recordDate" />
  <label>العداد عند التغيير (كم)</label>
  <input type="number" id="recordKm" placeholder="مثال: 45000" />
  <label>فلتر الزيت</label>
  <select id="oilFilterSelect">
    <option value="تم تغييره">✅ تم تغييره</option>
    <option value="لم يتم تغييره">❌ لم يتم تغييره</option>
  </select>
  <label>فلتر الديزل</label>
  <select id="dieselFilterSelect">
    <option value="تم تغييره">✅ تم تغييره</option>
    <option value="لم يتم تغييره">❌ لم يتم تغييره</option>
  </select>
  <label>ملاحظات (اختياري)</label>
  <input id="recordNotes" placeholder="أي ملاحظات إضافية" />
  <button id="saveRecordBtn">➕ إضافة سجل</button>
</div>

<!-- بحث وحذف -->
<div class="card">
  <h3>بحث وحذف</h3>
  <input id="searchPlate" placeholder="ادخل رقم اللوحة للبحث" />
  <button id="searchCarBtn">🔍 بحث</button>
  <button id="deleteCarBtn" class="btn-danger">🗑 حذف السيارة</button>
</div>

<!-- قائمة السيارات -->
<div class="card">
  <h3>سيارات الشركة</h3>
  <div id="carList"></div>
</div>

<script>
  const darkToggle = document.getElementById("darkToggle");
  if (localStorage.getItem("darkMode") === "on") {
    document.body.classList.add("dark");
    darkToggle.textContent = "☀️";
  }
  darkToggle.addEventListener("click", () => {
    document.body.classList.toggle("dark");
    const isDark = document.body.classList.contains("dark");
    darkToggle.textContent = isDark ? "☀️" : "🌙";
    localStorage.setItem("darkMode", isDark ? "on" : "off");
  });
</script>

</body>
</html>
